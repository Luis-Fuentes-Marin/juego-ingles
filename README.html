<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Master Deluxe</title>

<style>
*{box-sizing:border-box}
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.panel{
    background:#fff;
    width:650px;
    max-width:95%;
    padding:25px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.4);
    text-align:center;
}
h1{color:#2196f3}
.info{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    font-weight:bold;
    margin:15px 0;
}
button{
    width:100%;
    padding:15px;
    margin:8px 0;
    border:none;
    border-radius:10px;
    background:#4CAF50;
    color:#fff;
    font-size:18px;
    cursor:pointer;
}
button:hover{transform:scale(1.02)}
input{
    width:100%;
    padding:12px;
    font-size:18px;
}
.barra{
    width:100%;
    height:20px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
}
#xp{
    width:0%;
    height:100%;
    background:#4CAF50;
    transition:.5s;
}
.pregunta{
    font-size:28px;
    margin:20px 0;
}
</style>
</head>
<body>

<div class="panel" id="pantalla">
    <h1>🎮 ENGLISH MASTER DELUXE</h1>
    <p>Aprende inglés jugando</p>
    <input id="nombre" placeholder="Ingresa tu nombre">
    <button onclick="iniciar()">▶ COMENZAR</button>
</div>

<script>
const audio=new(window.AudioContext||window.webkitAudioContext)();

function nota(freq,dur=.3,tipo="triangle",vol=.03){
    const o=audio.createOscillator();
    const g=audio.createGain();
    o.type=tipo;
    o.frequency.value=freq;
    o.connect(g);
    g.connect(audio.destination);
    g.gain.value=vol;
    o.start();
    o.stop(audio.currentTime+dur);
}

let menuMusic,gameMusic;

function musicaMenu(){
    const mel=[262,330,392,523,392,330];
    let i=0;
    menuMusic=setInterval(()=>{
        nota(mel[i],.35,"triangle",.02);
        i=(i+1)%mel.length;
    },450);
}

function musicaJuego(){
    clearInterval(menuMusic);
    const mel=[220,262,294,330,392,330,294,262];
    let i=0;
    gameMusic=setInterval(()=>{
        nota(mel[i],.25,"sine",.02);
        i=(i+1)%mel.length;
    },250);
}

function correcto(){
    nota(523,.1,"square",.08);
    setTimeout(()=>nota(659,.1,"square",.08),100);
    setTimeout(()=>nota(784,.15,"square",.08),200);
}

function incorrecto(){
    nota(180,.35,"sawtooth",.08);
}

const preguntas=[
{p:"Apple",r:"Manzana",o:["Casa","Manzana","Perro","Mesa"]},
{p:"Dog",r:"Perro",o:["Perro","Libro","Agua","Gato"]},
{p:"House",r:"Casa",o:["Casa","Árbol","Mesa","Sol"]},
{p:"Book",r:"Libro",o:["Libro","Escuela","Pelota","Zapato"]},
{p:"Water",r:"Agua",o:["Leche","Agua","Pan","Casa"]},
{p:"Chair",r:"Silla",o:["Puerta","Mesa","Silla","Ventana"]},
{p:"Computer",r:"Computadora",o:["Radio","TV","Computadora","Celular"]},
{p:"Airport",r:"Aeropuerto",o:["Terminal","Puerto","Aeropuerto","Banco"]},
{p:"School",r:"Escuela",o:["Hospital","Escuela","Banco","Hotel"]},
{p:"Beautiful",r:"Hermoso",o:["Grande","Lento","Hermoso","Pequeño"]},
{p:"Remember",r:"Recordar",o:["Dormir","Recordar","Hablar","Comer"]},
{p:"Understand",r:"Entender",o:["Leer","Escuchar","Entender","Correr"]},
{p:"Knowledge",r:"Conocimiento",o:["Memoria","Experiencia","Conocimiento","Ciencia"]},
{p:"Opportunity",r:"Oportunidad",o:["Trabajo","Problema","Oportunidad","Decisión"]},
{p:"Achievement",r:"Logro",o:["Sueño","Fracaso","Esfuerzo","Logro"]}
];

let jugador="",i=0,puntos=0,vidas=3,nivel=1,tiempo=10,timer,inicio;

musicaMenu();

function iniciar(){
    jugador=document.getElementById("nombre").value||"Jugador";
    inicio=Date.now();
    musicaJuego();

    document.getElementById("pantalla").innerHTML=`
    <h1>🎮 English Master</h1>
    <div class="info">
        <div id="vidas">❤️❤️❤️</div>
        <div id="nivel">🎯 Nivel 1</div>
        <div id="pts">⭐ 0/15</div>
        <div id="time">⏱️10</div>
    </div>
    <div class="barra"><div id="xp"></div></div>
    <div class="pregunta" id="pregunta"></div>
    <button onclick="hablar()">🔊 Pronunciar</button>
    <div id="ops"></div>
    <div id="msg"></div>`;
    mostrar();
}

function hablar(){
    speechSynthesis.speak(
        new SpeechSynthesisUtterance(preguntas[i].p)
    );
}

function reloj(){
    clearInterval(timer);
    tiempo=10;
    document.getElementById("time").innerHTML="⏱️"+tiempo;

    timer=setInterval(()=>{
        tiempo--;
        document.getElementById("time").innerHTML="⏱️"+tiempo;
        if(tiempo<=0){
            clearInterval(timer);
            vidas--;
            actualizar();
            siguiente();
        }
    },1000);
}

function actualizar(){
    document.getElementById("vidas").innerHTML="❤️".repeat(vidas);
    document.getElementById("pts").innerHTML=`⭐ ${puntos}/15`;
    document.getElementById("xp").style.width=(puntos/15*100)+"%";
}

function mostrar(){
    if(i>=preguntas.length||vidas<=0){fin();return;}

    reloj();

    const q=preguntas[i];
    document.getElementById("pregunta").innerHTML=
        `¿Qué significa?<br><span style="color:#2196f3">${q.p}</span>`;

    const div=document.getElementById("ops");
    div.innerHTML="";

    q.o.forEach(op=>{
        const b=document.createElement("button");
        b.textContent=op;
        b.onclick=()=>verificar(op);
        div.appendChild(b);
    });
}

function verificar(op){
    clearInterval(timer);

    if(op===preguntas[i].r){
        puntos++;
        correcto();
        document.getElementById("msg").innerHTML="✅ Correcto";
    }else{
        vidas--;
        incorrecto();
        document.getElementById("msg").innerHTML=
            "❌ "+preguntas[i].r;
    }

    actualizar();

    if((i+1)%3===0&&i<14){
        nivel++;
        document.getElementById("nivel").innerHTML=
            "🎯 Nivel "+nivel;
    }

    setTimeout(siguiente,1000);
}

function siguiente(){
    i++;
    document.getElementById("msg").innerHTML="";
    mostrar();
}

function fin(){
    clearInterval(timer);
    clearInterval(gameMusic);

    let medalla="🥉 Bronce";
    if(puntos>=6) medalla="🥈 Plata";
    if(puntos>=11) medalla="🥇 Oro";

    const seg=Math.floor((Date.now()-inicio)/1000);

    document.getElementById("pantalla").innerHTML=`
    <h1>🏆 FIN DEL JUEGO</h1>
    <h2>${jugador}</h2>
    <p>⭐ Puntaje: ${puntos}/15</p>
    <p>${medalla}</p>
    <p>🎯 Nivel alcanzado: ${nivel}</p>
    <p>📊 Precisión: ${Math.round(puntos/15*100)}%</p>
    <p>⏱️ Tiempo: ${seg} segundos</p>
    <button onclick="location.reload()">🔄 Jugar otra vez</button>`;
}
</script>

</body>
</html>
